    <script>
          form.onsubmit = (e) => {
            let valid = true;

            // Validate email field
            if (emailField.value.trim() === "") {
                showError(emailError, "Email can't be blank");
                valid = false;
            } else if (!isValidEmail(emailField.value)) {
                showError(emailError, "Enter a valid email address");
                valid = false;
            } else {
                hideError(emailError);
            }

            // Validate password field
            if (passwordField.value.trim() === "") {
                showError(passwordError, "Password can't be blank");
                valid = false;
            } else if (passwordField.value.length < 6) {
                showError(passwordError, "Password must be at least 6 characters");
                valid = false;
            } else {
                hideError(passwordError);
            }

            // If validation fails, prevent form submission
            if (!valid) {
                e.preventDefault();
            }
        };

        
    function showPopup() {
        document.getElementById("resetPopup").style.display = "block";
    }

    function closePopup() {
    document.getElementById("resetPopup").style.display = "none";
}
</script>
<script>
function resetPassword() {
    const email = document.getElementById("resetEmail").value;
    const bdate = document.getElementById("resetBdate").value;
    const newPassword = document.getElementById("resetNewPassword").value;
//Ajax code
    const xhr = new XMLHttpRequest();//Creates a new AJAX request object called xhr.
    xhr.open("POST", "reset_password.php", true);// sending data
    xhr.setRequestHeader("Content-type", "application/x-www-form-urlencoded");// it Means normal form format ( tells the PHP server how to read the incoming data)
//this.responseText contains whatever the server sends back and puts inside resetmessage
    xhr.onload = function () {
        document.getElementById("resetMessage").textContent = this.responseText;//This function will automatically run when the server sends a reply
    };
//ncodeURIComponent(email)/bdate/newpassword makes the email safe for sending
    xhr.send(`email=${encodeURIComponent(email)}&bdate=${encodeURIComponent(bdate)}&newPassword=${encodeURIComponent(newPassword)}`);//Actually sends the data collected from the input fields.
}
</script>
