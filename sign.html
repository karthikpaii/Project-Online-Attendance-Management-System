            <h2>Sign Up Now</h2>

<script>
    const roleSelect = document.getElementById('roleSelect');//selecting html by id
    const collegeCodeBox = document.getElementById('collegeCodeBox');
    const signupForm = document.getElementById('signupForm');
    const bdateField = document.getElementById("bdate");
    const bdateError = bdateField.parentElement.querySelector(".error-message");

    roleSelect.addEventListener('change', function() {
        if (this.value === 'admin') { // this refers to roleselect
            collegeCodeBox.style.display = 'block';//shows college code
        } else {
            collegeCodeBox.style.display = 'none';// hides
        }
    });

    signupForm.addEventListener('submit', function(e) {
        if (roleSelect.value === 'admin') {// if admin then get college code
            const collegeCodeInput = document.getElementById('collegeCodeInput').value.trim();
            if (collegeCodeInput !== '123456') {
                e.preventDefault();// stops the default action 
                alert('Invalid College Code. Please enter the correct code.');
            }
        }
    });

    //another js
    
        const form = document.querySelector("form"),
            emailField = document.getElementById("emailF"),
            passwordField = document.getElementById("passF"),
            emailError = emailField.parentElement.querySelector(".error-message"),
            passwordError = passwordField.parentElement.querySelector(".error-message");

        form.onsubmit = (e) => {
            let valid = true;

            // Validate email field
            if (emailField.value.trim() === "") {
                showError(emailError, "Email can't be blank");
                valid = false;
            } else if (!isValidEmail(emailField.value)) {
                showError(emailError, "Enter a valid email address");
                valid = false;
            } else {
                hideError(emailError);
            }

            // Validate password field
            if (passwordField.value.trim() === "") {
                showError(passwordError, "Password can't be blank");
                valid = false;
            } else if (passwordField.value.length < 6) {
                showError(passwordError, "Password must be at least 6 characters");
                valid = false;
            } else {
                hideError(passwordError);
            }

            // If validation fails, prevent form submission
            if (!valid) {
                e.preventDefault();
            }
        };

        // Real-time validation
        emailField.addEventListener("keyup", () => validateField(emailField, emailError, isValidEmail, "Enter a valid email address"));
        passwordField.addEventListener("keyup", () => validateField(passwordField, passwordError, (val) => val.length >= 6, "Password must be at least 6 characters"));

        function validateField(input, errorElement, validationFn, errorMessage) {
            if (input.value.trim() === "") {
                showError(errorElement, input.name.charAt(0).toUpperCase() + input.name.slice(1) + " can't be blank");/* input.name.charAt(0).toUpperCase() capitalizes the first letter of the input name (like email). input.name.slice(1) gets the rest of the string.
            , Combining these gives  a capitalized version of the input field's name. " can't be blank" adds the error message. (ex:email cant be blank or password...*/
            } else if (!validationFn(input.value)) {
                showError(errorElement, errorMessage);
            } else {
                hideError(errorElement);
            }
        }

        function showError(element, message) {
            element.textContent = message;
            element.style.display = "block";
        }

        function hideError(element) {
            element.textContent = "";
            element.style.display = "none";
        }

        function isValidEmail(email) {
            return /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email);
        }

        form.onsubmit = (e) => {
    let valid = true;


    // Birth date validation
    if (!bdateField.value) {
        showError(bdateError, "Birth date is required");
        valid = false;
    } else {
        const inputParts = bdateField.value.split("-");
        const year = parseInt(inputParts[0], 10);
        const month = parseInt(inputParts[1], 10);
        const day = parseInt(inputParts[2], 10);

        if (isNaN(year) || isNaN(month) || isNaN(day)) {
            showError(bdateError, "Invalid date format");
            valid = false;
        } else if (year > 2025) {
            showError(bdateError, "Year cannot be greater than 2025");
            valid = false;
        } else if (month > 12 || month < 1) {
            showError(bdateError, "Month must be between 1 and 12");
            valid = false;
        } else if (day < 1 || day > new Date(year, month, 0).getDate()) {
            showError(bdateError, "Invalid day for selected month");
            valid = false;
        } else {
            hideError(bdateError);
        }
    }

    if (!valid) {
        e.preventDefault();
    }
};

// Run validation on blur/change after user interaction
bdateField.addEventListener("blur", () => {
    if (!bdateField.value) {
        showError(bdateError, "Birth date is required");
        return;
    }

    const inputParts = bdateField.value.split("-");
    const year = parseInt(inputParts[0], 10);
    const month = parseInt(inputParts[1], 10);
    const day = parseInt(inputParts[2], 10);

    if (isNaN(year) || isNaN(month) || isNaN(day)) {
        showError(bdateError, "Invalid date format");
    } else if (year > 2025) {
        showError(bdateError, "Year cannot be greater than 2025");
    } else if (month > 12 || month < 1) {
        showError(bdateError, "Month must be between 1 and 12");
    } else if (day < 1 || day > new Date(year, month, 0).getDate()) {
        showError(bdateError, "Invalid day for selected month");
    } else {
        hideError(bdateError);
    }
});

    </script>
